# Mission Spec — Architecture Registry (hand-curated)
# 현재 모듈 구조, 책임, 의존관계를 machine-readable로 기록합니다.
# mission-history.yaml의 architecture_delta와 연동: delta는 변경 추적, 이 파일은 현재 상태.
# 자동 검증: `npm run arch:verify` 로 src/ 와 이 파일의 모듈 목록 + depends_on 동기 확인.
# 파생 파일: .mission/architecture/ARCHITECTURE_COMPUTED.yaml (src/ 에서 자동 추출).
# Last updated: 2026-04-17 | Version: 1.16.0

system:
  name: "mission-spec"
  description: "AI 에이전트 워크플로를 위한 task contract layer"
  runtime: "Node.js 20+ (ESM)"
  language: "TypeScript"
  entry_point: "src/index.ts"

modules:
  - id: validator
    path: "src/schema/validator.ts"
    responsibility: "mission.yaml 및 mission-history.yaml JSON Schema 검증"
    depends_on: []
    schemas:
      - "src/schema/mission.schema.json"
      - "src/schema/mission-history.schema.json"
    exports:
      - "validateMission(data): ValidationResult"
      - "validateHistory(data): ValidationResult"

  - id: parser
    path: "src/core/parser.ts"
    responsibility: "mission.yaml 파싱 + 스키마 검증 진입점"
    depends_on: [validator]
    exports:
      - "parseMissionFile(filePath): unknown"
      - "loadAndValidateMission(projectDir): MissionDocument"
    types:
      - "MissionDocument"

  - id: evaluator
    path: "src/core/evaluator.ts"
    responsibility: "done_when 조건 평가 엔진 (rule-based + automated + llm-eval override)"
    depends_on: []
    exports:
      - "evaluateCriterion(criterion, projectDir, evals?): CriterionResult"
      - "evaluateAllCriteria(criteria, projectDir, evals?): CriterionResult[]"
    types:
      - "CriterionResult"
    evaluation_rules:
      - priority: 1
        type: "llm-eval / llm-judge"
        mechanism: ".mission/evals/<name>.result.yaml 오버라이드 조회"
      - priority: 2
        type: "automated"
        mechanism: "execSync(command)"
      - priority: 3
        type: "file-existence"
        mechanism: "정규식 /^(.+?)\\s*(?:파일\\s*)?존재$/ 또는 영문 패턴"
      - priority: 4
        type: "test-pattern"
        mechanism: "정규식 /테스트\\s*통과|test.*pass/i"
      - priority: 5
        type: "fallback"
        mechanism: "자동 평가 불가 — 수동 확인 필요"

  - id: history
    path: "src/core/history.ts"
    responsibility: "mission-history.yaml 로더 + 스키마 검증 + phase/entry 조회"
    depends_on: [validator]
    exports:
      - "loadHistory(projectDir): MissionHistory | null"
      - "getLatestEntry(history): HistoryEntry | null"
      - "getCurrentPhase(history): EvolutionPhase | null"
    types:
      - "MissionHistory"
      - "HistoryEntry"
      - "EvolutionPhase"
      - "ArchitectureDelta"
      - "ModuleEntry"
      - "InterfaceChange"

  - id: reporter
    path: "src/core/reporter.ts"
    responsibility: "리포트 마크다운 렌더링 (평가 결과 + 최근 변경 + 경고)"
    depends_on: [evaluator, history]
    exports:
      - "renderReport(data: ReportData): string"
    types:
      - "ReportData"

  - id: init
    path: "src/commands/init.ts"
    responsibility: "자연어 → mission.yaml 초안 생성"
    depends_on: [validator]
    exports:
      - "generateMissionDraft(options: InitOptions): InitResult"

  - id: eval
    path: "src/commands/eval.ts"
    responsibility: "done_when 전체 평가 오케스트레이션"
    depends_on: [parser, evaluator]
    exports:
      - "evaluateMission(projectDir): EvalResult"
    types:
      - "EvalResult"

  - id: status
    path: "src/commands/status.ts"
    responsibility: "미션 진행 상황 요약 (eval + history + markdown)"
    depends_on: [parser, eval, history]
    exports:
      - "getMissionStatus(projectDir): StatusResult"
    types:
      - "StatusResult"

  - id: report
    path: "src/commands/report.ts"
    responsibility: "완료 리포트 생성 (eval + history + reporter + traceability)"
    depends_on: [parser, eval, reporter, history]
    exports:
      - "generateMissionReport(projectDir): ReportResult"
    types:
      - "ReportResult"

  - id: context
    path: "src/commands/context.ts"
    responsibility: "AI 에이전트를 위한 프로젝트 컨텍스트 프롬프트 생성"
    depends_on: [parser, history]
    exports:
      - "generateContext(projectDir): ContextResult"
    types:
      - "ContextResult"

  - id: arch-diff
    path: "src/core/arch-diff.ts"
    responsibility: "Architecture Registry 버전 간 diff 생성 (모듈/의존 변경 감지)"
    depends_on: []
    exports:
      - "diffArchitectures(oldData, newData, fromLabel?, toLabel?): ArchDiffResult"
      - "diffArchitectureFromGit(projectDir, ref?): ArchDiffResult"
    types:
      - "ArchDiffResult"
      - "ModuleDiff"
      - "DependencyDiff"

  - id: platforms
    path: "src/adapters/platforms.ts"
    responsibility: "cross-platform 변환 — 6개 대상 에이전트 포맷 생성 (Cursor, Codex, OpenCode, Cline, Continue, Aider)"
    depends_on: []
    exports:
      - "convertToCursor(mission): string"
      - "convertToCodex(mission): string"
      - "convertToOpenCode(mission): string"
      - "convertToCline(mission): string"
      - "convertToContinue(mission): string"
      - "convertToAider(mission): AiderArtifacts"
    types:
      - "AiderArtifacts"

  - id: architecture-extractor
    path: "src/core/architecture-extractor.ts"
    responsibility: "src/ AST 추출로 모듈/의존/exports/public_api 결정성 있게 스냅샷"
    depends_on: []
    exports:
      - "extractArchitecture(projectDir): ExtractedArchitecture"
    types:
      - "ExtractedArchitecture"
      - "ExtractedModule"
      - "ExtractedEdge"

  - id: plugin-validator
    path: "src/core/plugin-validator.ts"
    responsibility: "Claude Code plugin 매니페스트 + SKILL.md 구조/버전 일관성 검증"
    depends_on: []
    exports:
      - "validatePlugin(projectDir): PluginValidationResult"
    types:
      - "PluginValidationResult"

  - id: decide
    path: "src/commands/decide.ts"
    responsibility: "자연어 입력 → MDR-NNN-<slug>.md 초안 생성 (.mission/decisions/ 스캔으로 다음 번호 자동 할당)"
    depends_on: []
    exports:
      - "generateMdrDraft(options: DecideOptions): DecideResult"
    types:
      - "DecideOptions"
      - "DecideResult"

  - id: migration
    path: "src/core/migration.ts"
    responsibility: "Schema version 간 마이그레이션 인프라 — 등록된 migrator 체인(BFS)으로 mission 문서를 목표 version 으로 업그레이드"
    depends_on: []
    exports:
      - "detectSchemaVersion(doc): SchemaVersion"
      - "registerMigration(from, to, fn): void"
      - "migrateMission(doc, from?, to): MigrationResult"
      - "listMigrations(): MigrationStep[]"
    types:
      - "SchemaVersion"
      - "MigrationFn"
      - "MigrationResult"

  - id: reconstruction-verifier
    path: "src/core/reconstruction-verifier.ts"
    responsibility: "REBUILD_PLAYBOOK.md가 참조하는 repo 경로의 존재 여부 확인 (drift 자동 감지); CLI는 --cold-build로 temp dir 에서 ci+build+test 까지 수행"
    depends_on: []
    exports:
      - "verifyReconstructionReferences(projectDir, options?): ReconstructionResult"
    types:
      - "ReconstructionResult"
      - "ReconstructionOptions"

  - id: index
    path: "src/index.ts"
    responsibility: "public API 재수출 허브 (barrel export) — package.json exports가 가리키는 진입점"
    depends_on:
      [
        validator,
        parser,
        init,
        eval,
        status,
        report,
        context,
        arch-diff,
        history,
        architecture-extractor,
        plugin-validator,
        decide,
        migration,
        reconstruction-verifier,
      ]
    exports:
      - "re-exports from schema/validator, core/parser, commands/*, core/history, core/arch-diff, core/architecture-extractor, core/plugin-validator"

data_flow:
  pipeline: "parse → validate → evaluate → render"
  detail:
    - step: "parse"
      module: parser
      input: "mission.yaml (file path)"
      output: "MissionDocument"
    - step: "validate"
      module: validator
      input: "parsed YAML object"
      output: "ValidationResult { valid, errors }"
    - step: "evaluate"
      module: evaluator
      input: "done_when criteria + projectDir + evals"
      output: "CriterionResult[] → EvalResult"
    - step: "render"
      module: reporter
      input: "ReportData (eval results + history + metadata)"
      output: "markdown string"

file_conventions:
  - pattern: ".mission/evals/<name>.result.yaml"
    purpose: "llm-eval/llm-judge 오버라이드 판정 기록"
    schema: "{ passed: bool, reason?: string, evaluated_by?: string, evaluated_at?: string }"
  - pattern: ".mission/snapshots/<date>_v<version>_mission.yaml"
    purpose: "mission.yaml 버전별 스냅샷 (pre-commit 훅으로 자동 생성)"
  - pattern: ".mission/decisions/MDR-NNN-<topic>.md"
    purpose: "Mission Decision Record (ADR 패턴)"
