    notes: |
      Formal tracked MINOR for adopter compatibility. `validateHistory()` and `loadHistory()`
      now normalize sparse legacy `changes` / `done_when_delta` arrays before schema
      validation or history loading, while preserving wrong-typed values as hard failures.
      `evaluateMission()` / `getMissionStatus()` gained `shared` scope and CLI `--shared`
      so fresh-clone reviews can skip criteria that only reference missing gitignored
      local-only artifacts. The evaluator also executes a small allowlisted set of safe
      inferred command clauses from prose/backticked success statements. Re-check on
      qmonster improved from `validate` fail + `eval 0/86` to `validate` pass +
      `eval --shared 14/86`, confirming the remaining gap is prose gate structure rather
      than ledger/shared-clone compatibility.

