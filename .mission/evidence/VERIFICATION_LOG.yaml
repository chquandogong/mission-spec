    notes: |
      PATCH retag of 055303a self-description correction. Original commit tagged as
      v1.20.0 in error — CHANGELOG gained a duplicate `## [1.20.0]` section in
      violation of Keep-a-Changelog's `version × date` uniqueness. MDR-006 §PATCH
      (docs / MDR / README / CHANGELOG 업데이트) classifies this class of change as
      PATCH, so `mission-history.yaml` entry MSC-2026-04-22-001 was retagged to
      `1.20.1`, and all consumer-surface metadata (mission.yaml, package.json,
      plugin.json, marketplace.json, package-lock.json, `.mission/` Version headers,
      CURRENT_STATE title and version range) was re-synced. CHANGELOG regeneration
      produced 47 entries with `[1.20.1]` 2026-04-22 as the sole v1.20.x 2026-04-22
      entry. No runtime/API change.

