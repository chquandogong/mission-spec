# Mission Spec — API / Interface Registry
# 외부와 맺고 있는 모든 계약(public exports, skill surface, file format contracts)을 한 곳에 기록합니다.
# Last updated: 2026-04-21 | Version: 1.20.0

# ── 1. Public Library API (src/index.ts → package.json exports) ──

public_api:
  entry: "src/index.ts"
  package_exports:
    ".":
      types: "./dist/index.d.ts"
      import: "./dist/index.js"
    "./commands/init":
      types: "./dist/commands/init.d.ts"
      import: "./dist/commands/init.js"
    "./commands/eval":
      types: "./dist/commands/eval.d.ts"
      import: "./dist/commands/eval.js"
    "./commands/status":
      types: "./dist/commands/status.d.ts"
      import: "./dist/commands/status.js"
    "./commands/report":
      types: "./dist/commands/report.d.ts"
      import: "./dist/commands/report.js"
    "./commands/context":
      types: "./dist/commands/context.d.ts"
      import: "./dist/commands/context.js"
    "./commands/decide":
      types: "./dist/commands/decide.d.ts"
      import: "./dist/commands/decide.js"

  functions:
    - name: "validateMission"
      signature: "(data: unknown) => ValidationResult"
      source: "src/schema/validator.ts"
    - name: "validateHistory"
      signature: "(data: unknown) => ValidationResult"
      source: "src/schema/validator.ts"
    - name: "parseMissionFile"
      signature: "(filePath: string) => unknown"
      source: "src/core/parser.ts"
    - name: "loadAndValidateMission"
      signature: "(projectDir: string) => MissionDocument"
      source: "src/core/parser.ts"
    - name: "generateMissionDraft"
      signature: "(options: InitOptions) => InitResult"
      source: "src/commands/init.ts"
    - name: "evaluateMission"
      signature: "(projectDir: string, options?: EvaluateOptions) => EvalResult"
      source: "src/commands/eval.ts"
    - name: "getMissionStatus"
      signature: "(projectDir: string, options?: EvaluateOptions) => StatusResult"
      source: "src/commands/status.ts"
    - name: "generateMissionReport"
      signature: "(projectDir: string) => ReportResult"
      source: "src/commands/report.ts"
    - name: "loadHistory"
      signature: "(projectDir: string) => MissionHistory | null"
      source: "src/core/history.ts"
    - name: "getLatestEntry"
      signature: "(history: MissionHistory) => HistoryEntry | null"
      source: "src/core/history.ts"
    - name: "getCurrentPhase"
      signature: "(history: MissionHistory) => EvolutionPhase | null"
      source: "src/core/history.ts"
    - name: "generateContext"
      signature: "(projectDir: string) => ContextResult"
      source: "src/commands/context.ts"
    - name: "diffArchitectures"
      signature: "(oldData, newData, fromLabel?, toLabel?) => ArchDiffResult"
      source: "src/core/arch-diff.ts"
    - name: "diffArchitectureFromGit"
      signature: "(projectDir: string, ref?: string) => ArchDiffResult"
      source: "src/core/arch-diff.ts"
    - name: "extractArchitecture"
      signature: "(projectDir: string) => ExtractedArchitecture"
      source: "src/core/architecture-extractor.ts"
    - name: "validatePlugin"
      signature: "(projectDir: string) => PluginValidationResult"
      source: "src/core/plugin-validator.ts"
    - name: "generateMdrDraft"
      signature: "(options: DecideOptions) => DecideResult"
      source: "src/commands/decide.ts"
    - name: "detectSchemaVersion"
      signature: "(doc: unknown) => SchemaVersion"
      source: "src/core/migration.ts"
    - name: "migrateMission"
      signature: "(doc: MissionDocLike, from: SchemaVersion | undefined, to: SchemaVersion) => MigrationResult"
      source: "src/core/migration.ts"
    - name: "registerMigration"
      signature: "(from: SchemaVersion, to: SchemaVersion, fn: MigrationFn) => void"
      source: "src/core/migration.ts"
    - name: "listMigrations"
      signature: "() => { from: SchemaVersion; to: SchemaVersion }[]"
      source: "src/core/migration.ts"
    - name: "verifyReconstructionReferences"
      signature: "(projectDir: string, options?: ReconstructionOptions) => ReconstructionResult"
      source: "src/core/reconstruction-verifier.ts"
    - name: "validateProject"
      signature: "(projectDir: string) => ValidateResult"
      source: "src/commands/validate.ts"
    - name: "backfillRelatedCommits"
      signature: "(projectDir: string, options?: { apply?: boolean }) => BackfillResult"
      source: "src/commands/backfill-commits.ts"
    - name: "createSnapshot"
      signature: "(projectDir: string) => SnapshotResult"
      source: "src/commands/snapshot.ts"

# ── 2. Skill Surface (Claude Code Plugin) ──

skill_surface:
  plugin_metadata: ".claude-plugin/plugin.json"
  marketplace_metadata: ".claude-plugin/marketplace.json"
  skills:
    - id: "ms-init"
      path: "skills/ms-init/SKILL.md"
      invocation: "/mission-spec:ms-init"
    - id: "ms-eval"
      path: "skills/ms-eval/SKILL.md"
      invocation: "/mission-spec:ms-eval"
    - id: "ms-status"
      path: "skills/ms-status/SKILL.md"
      invocation: "/mission-spec:ms-status"
    - id: "ms-report"
      path: "skills/ms-report/SKILL.md"
      invocation: "/mission-spec:ms-report"
    - id: "ms-context"
      path: "skills/ms-context/SKILL.md"
      invocation: "/mission-spec:ms-context"
    - id: "ms-decide"
      path: "skills/ms-decide/SKILL.md"
      invocation: "/mission-spec:ms-decide"

# ── 3. Schema IDs ──

schemas:
  - id: "https://mission-spec.dev/schema/v1/mission.schema.json"
    path: "src/schema/mission.schema.json"
    purpose: "mission.yaml 구조 정의"
  - id: "https://mission-spec.dev/schema/v1/mission-history.schema.json"
    path: "src/schema/mission-history.schema.json"
    purpose: "mission-history.yaml 구조 정의"

# ── 4. File Format Contracts ──

file_contracts:
  - pattern: ".clinerules"
    schema: null
    required: false
    description: "Cline 에이전트용 markdown 규칙 파일 (convert-platforms 로 생성)"

  - pattern: ".continuerules"
    schema: null
    required: false
    description: "Continue 에이전트용 markdown 규칙 파일 (convert-platforms 로 생성)"

  - pattern: ".aider.conf.yml"
    schema: null
    required: false
    description: "Aider YAML 설정, read: 로 .aider-mission.md 지정 (convert-platforms 로 생성)"

  - pattern: ".aider-mission.md"
    schema: null
    required: false
    description: "Aider 컨텍스트 파일 (convert-platforms 로 생성)"

  - pattern: "mission.yaml"
    schema: "mission.schema.json"
    required: true
    description: "프로젝트의 task contract 정의"

  - pattern: "mission-history.yaml"
    schema: "mission-history.schema.json"
    required: false
    description: "변경 이력 원장 (Living Asset Registry)"

  - pattern: ".mission/evals/<name>.result.yaml"
    schema: null
    required: false
    description: "llm-eval/llm-judge 오버라이드 판정 파일"
    fields:
      - "passed: boolean (필수)"
      - "reason?: string"
      - "evaluated_by?: string"
      - "evaluated_at?: string"

  - pattern: ".mission/snapshots/<date>_v<version>_mission.yaml"
    schema: "mission.schema.json"
    required: false
    description: "mission.yaml 버전별 스냅샷 (pre-commit 훅으로 자동 생성)"
    dedup_rule: "같은 version의 스냅샷이 이미 있으면 생성하지 않음"

  - pattern: ".mission/decisions/MDR-NNN-<topic>.md"
    schema: null
    required: false
    description: "Mission Decision Record (ADR 패턴)"

# ── 5. Hook Contracts ──

hooks:
  - trigger: "pre-commit"
    path: ".githooks/pre-commit"
    activation: "git config core.hooksPath .githooks"
    behavior: "npm run snapshot으로 snapshot 생성/스테이징, npm run changelog와 npm run metadata:sync로 maintainer metadata 갱신, 조건부 arch:sync/arch:verify 후 validate:history-commits로 history 누락 검사"
    side_effects:
      - ".mission/snapshots/<date>_v<version>_mission.yaml 생성 (신규 버전일 때만)"
      - "CHANGELOG.md 재생성 및 스테이징"
      - ".mission/ Version 헤더 동기화 및 스테이징"
      - ".mission/architecture/ARCHITECTURE_COMPUTED.yaml 재생성 및 스테이징"
