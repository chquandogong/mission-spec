# Mission Spec — Traceability Matrix
# requirement(done_when) → eval → code(module) → test(file) 매핑
# Last updated: 2026-04-17 | Version: 1.16.10

# ── done_when 기준 추적 ──

requirements:
  - criterion: "skills/ms-init/SKILL.md 존재"
    eval_type: "file-existence (rule-based)"
    eval_name: null
    code:
      - "src/core/evaluator.ts (FILE_EXISTENCE_PATTERN)"
    artifact: "skills/ms-init/SKILL.md"
    tests:
      - "tests/commands/eval.test.ts: marks file-existence checks"

  - criterion: "skills/ms-eval/SKILL.md 존재"
    eval_type: "file-existence (rule-based)"
    eval_name: null
    code:
      - "src/core/evaluator.ts (FILE_EXISTENCE_PATTERN)"
    artifact: "skills/ms-eval/SKILL.md"
    tests:
      - "tests/commands/eval.test.ts: marks file-existence checks"

  - criterion: "skills/ms-status/SKILL.md 존재"
    eval_type: "file-existence (rule-based)"
    eval_name: null
    code:
      - "src/core/evaluator.ts (FILE_EXISTENCE_PATTERN)"
    artifact: "skills/ms-status/SKILL.md"
    tests:
      - "tests/commands/eval.test.ts: marks file-existence checks"

  - criterion: "skills/ms-report/SKILL.md 존재"
    eval_type: "file-existence (rule-based)"
    eval_name: null
    code:
      - "src/core/evaluator.ts (FILE_EXISTENCE_PATTERN)"
    artifact: "skills/ms-report/SKILL.md"
    tests:
      - "tests/commands/eval.test.ts: marks file-existence checks"

  - criterion: ".claude-plugin/plugin.json 존재"
    eval_type: "file-existence (rule-based)"
    eval_name: null
    code:
      - "src/core/evaluator.ts (FILE_EXISTENCE_PATTERN)"
    artifact: ".claude-plugin/plugin.json"
    tests:
      - "tests/commands/eval.test.ts: marks file-existence checks"

  - criterion: "README.md 존재"
    eval_type: "file-existence (rule-based)"
    eval_name: null
    code:
      - "src/core/evaluator.ts (FILE_EXISTENCE_PATTERN)"
    artifact: "README.md"
    tests:
      - "tests/commands/eval.test.ts: marks file-existence checks"

  - criterion: "schema_validation_passes"
    eval_type: "automated"
    eval_name: "schema_validation_passes"
    command: "node scripts/validate-schema.js"
    code:
      - "scripts/validate-schema.js"
      - "src/schema/validator.ts"
      - "src/schema/mission.schema.json"
      - "src/schema/mission-history.schema.json"
    tests:
      - "tests/schema.test.ts (35 tests)"
      - "tests/commands/eval.test.ts: runs automated eval"

  - criterion: "command_test"
    eval_type: "automated"
    eval_name: "command_test"
    command: "npm test"
    code:
      - "src/commands/*.ts"
      - "src/core/*.ts"
      - "src/schema/validator.ts"
      - "src/adapters/platforms.ts"
    tests:
      - "tests/ (총 248 tests across 21 files)"

  - criterion: "cross_platform_verifies"
    eval_type: "automated"
    eval_name: "cross_platform_verifies"
    command: "node scripts/convert-platforms.js --verify"
    code:
      - "scripts/convert-platforms.js"
      - "src/adapters/platforms.ts"
    tests:
      - "tests/platforms.test.ts (21 tests; v1.14+ includes Cline/Continue/Aider)"

# ── eval 전용 항목 (done_when에 직접 연결되지 않는 것) ──

standalone_evals:
  - eval_name: "dogfood_test"
    eval_type: "manual"
    description: "evaluateMission('.') 실행하여 done_when 충족 확인"
    code:
      - "src/commands/eval.ts"
    tests:
      - "tests/commands/eval.test.ts"

  - eval_name: "architecture_doc_freshness"
    eval_type: "llm-eval"
    pass_criteria: "design_refs.architecture가 가리키는 문서가 현재 소스코드와 일치"
    override_file: ".mission/evals/architecture_doc_freshness.result.yaml"
    design_ref: "docs/internal/ARCHITECTURE.md"
    code:
      - "src/core/evaluator.ts (loadLlmEvalOverride)"
    tests:
      - "tests/commands/eval.test.ts: llm-eval override tests (4 cases)"

# ── MDR → code/history 매핑 ──

decision_trace:
  - decision: "MDR-001-task-contract-only"
    enforced_in:
      - "mission.yaml: constraints[0]"
      - "src/core/evaluator.ts: no orchestration logic"
    related_history: ["MSC-2026-04-02-001"]

  - decision: "MDR-002-ms-prefix-adoption"
    enforced_in:
      - "skills/ms-*/SKILL.md: name field"
      - "README.md: skill invocation paths"
    related_history: ["MSC-2026-04-03-001"]

  - decision: "MDR-003-minimal-dependencies"
    enforced_in:
      - "package.json: dependencies (ajv + yaml only)"
      - "mission.yaml: constraints[3]"
    related_history: ["MSC-2026-04-02-001"]

  - decision: "MDR-004-done-when-eval-linking"
    enforced_in:
      - "src/core/evaluator.ts: eval.name === criterion matching"
      - "mission.yaml: done_when + evals alignment"
    related_history: ["MSC-2026-04-07-002"]

  - decision: "MDR-005-meta-tooling-expansion-within-task-contract-scope"
    enforced_in:
      - "src/core/{arch-diff,architecture-extractor,plugin-validator,migration,reconstruction-verifier}.ts: integrity verifiers (허용 범주 1)"
      - "src/commands/decide.ts + scripts/{snapshot-mission,generate-changelog,migrate-mission}.js: living-asset maintainers (범주 2)"
      - "bin/mission-spec.js + .github/workflows/release.yml + src/adapters/platforms.ts: distribution surface (범주 3)"
      - "mission.yaml: constraints[0] unchanged (MDR-001 + MDR-005 consistent)"
    related_history: ["MSC-2026-04-17-009"]

