    decision: |
      Three bundled changes, all patch-class per MDR-006. (1) src/core/plugin-validator.ts gains a readPackageLockVersions() helper and two new validateVersions checks — one for the top-level package-lock.json version, one for packages[""].version. Both are compared against package.json.version and emit a clear 'version drift: package.json=X but package-lock.json ...' error on mismatch. Two new unit tests in tests/core/plugin-validator.test.ts exercise both paths with an isolated writeLock() helper. Plugin-validator's module comment updated to advertise package-lock as a drift axis. (2) package-lock.json (which had silently stayed at 1.8.0 since that release!) rewritten to 1.16.6 then bumped again in this release to 1.16.7. This was exactly the class of drift the new validator is designed to catch; it will not recur. (3) The v1.16.6 test.extend + describe.concurrent + async execFile pattern is now applied to tests/scripts/bump-metadata.test.ts and tests/scripts/generate-architecture.test.ts, matching the v1.16.6 follow_up note that explicitly listed these as candidates 'if either grows past 5s wall time'. Total 239 tests (237 + 2 plugin-validator); REBUILD_PLAYBOOK + TRACE_MATRIX counts updated accordingly.
