  - change_id: "MSC-2026-04-23-006"
    semantic_version: "1.21.6"
    change_sequence: 58
    date: "2026-04-23"
    author: "Dr. QUAN"
    contributors: ["Claude"]
    change_type: "fix"
    motivation_type: "self-dogfooding"
    persistence: "permanent"
    intent: '자기 자신의 mission.yaml done_when 10개를 v1.21.0 IMP-10 `done_when_refs`로 explicit하게 바인딩한다. audit 결과 10개 criteria 전부 `resolved_by: "inference"`로 평가되고 있었다 — Mission Spec은 ms-status drift 경고로 adopter에게 inference-only 계약을 경고하면서 자기 자신엔 동일 기능을 적용하지 않는 self-dogfooding 구멍이 있었다.'
    decision: |
      '최초 목표를 실제로 달성하고 있는가?' self-audit 결과 10/10 PASS가
      전부 evaluator heuristic(파일명 + command 추론)에 의존하고 있었다.
      v1.21.0(IMP-10)에서 도입한 `done_when_refs`는 adopter가 prose 기반
      done_when을 concrete validator에 바인딩하기 위한 기능인데, 정작
      Mission Spec 자신의 mission.yaml엔 적용 안 됨.

      추가된 10 bindings (1:1 대응):
        - 0-5: `file-exists` (SKILL.md 4개 + `.claude-plugin/plugin.json`
          + `README.md`). criteria 문자열과 동일한 경로를 value에 명시.
        - 6-9: `eval-ref` (`schema_validation_passes`,
          `command_test`, `cross_platform_verifies`,
          `architecture_doc_freshness`). 기존 `evals[]`의 name에 그대로 바인딩.

      `ms-eval` 재실행 결과: 10/10 PASS, 전부 `resolved_by: "ref"`,
      `inference: 0`, `manual: 0`. Scaffolding warning / done_when drift
      warning 발동 없음 (v1.21.0 `validateProject` 3 invariant: index
      range / duplicate / eval-ref orphan 모두 통과).

      SemVer: MDR-006 §PATCH. mission.yaml 자체 편집, consumer surface 불변.
      라이브러리 API / CLI / 스키마 / 런타임 동작 변화 없음. 369/369 tests
      green.

      Scope-out (본 §PATCH에선 의도적으로 하지 않음):
        - done_when 문구 자체를 "기능 계약"으로 되돌리기 — 예:
          `"skills/ms-init/SKILL.md 존재"` → `"ms-init invoked with
          natural-language goal returns schema-valid draft"`. 이건
          `evals[]`에 실기능 테스트를 추가해야 해서 별도 MINOR(§MINOR)
          tier에 해당. 본 §PATCH는 '현재 문구에 대한 explicit ref'만 추가.
        - 'README 5분 설치 가이드' / 'Dogfooding 완료' 등 최초 v1.0.0
          done_when에 있었으나 약화 과정에서 사라진 항목의 복원. 별도
          scope 검토 필요 (복원 자체가 MINOR 이상).
    triggered_by: "사용자 요청 — '새 기능 추가보다 mission-spec이 최초 목표를 실제로 달성하는가를 감사해달라' + self-audit 결과 노출된 10/10 inference 구멍에 대해 권장 작업 1번 채택."
    issue_or_context: |
      v1.21.0(IMP-10)에서 `done_when_refs`를 도입할 때의 가장 큰 수혜자는
      Mission Spec 자신이어야 했다. qmonster 감사(v1.16.17)에서 발견된
      "기록 계약 충실, 검증 계약 비활성" 패턴이 Mission Spec 본체에도
      존재했다. 도구는 만들었지만 자기 자신에겐 적용 안 된 상태로 4
      revision(v1.21.0 → v1.21.5)이 지나갔다.

      본 §PATCH는 기능 추가가 아니다. v1.21.0 기능을 v1.21.6 시점에 자기
