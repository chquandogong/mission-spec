      mission_id는 non-goal — 프로젝트별 네이밍 convention(예: permanent `-planning` suffix) 때문에 키워드 기반 감지는 false-positive 위험.
      신규 helper `detectMetaStaleness` + 상수 `SINGLE_USER_TERMS` / `AI_CONTRIBUTOR_TERMS` + truncate helpers(`quoteTruncate` 120-char / `shortTruncate` 80-char)는 `commands/status.ts` 모듈 수준에서만 노출. `src/index.ts` 재노출 없음.
