          (또는 plugin-validator test file) 실행

      index 5(README)는 기능 계약 없이 유지 — 권장 작업 4(설치 가이드 npm
      primary 승격)에서 README 구조 자체가 재설계될 예정이라 churn 회피. index
      6-9는 이미 기능 계약(자동/LLM eval)이라 불변.

      재평가 결과: 10/10 PASS, resolved_by: ref 10 (eval-ref 9 + file-exists 1).
      v1.21.6 대비 eval-ref 4 → 9 증가 (기능 검증 축 +5). 369/369 tests 불변,
      schema valid, registry green.

      SemVer: MDR-006 §PATCH. mission.yaml 자체 편집, consumer surface 불변. 새
      source/CLI/schema 추가 0. 5 신규 evals는 Mission Spec 본인 self-verification
      용이며 adopter에게 노출되는 feature 아님.
