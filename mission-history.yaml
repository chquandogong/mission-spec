        - ".mission/decisions/MDR-008 amendment block (§CURRENT_STATE / §PHASE-BOUNDARY / §V1.21.4 / §COMPACTION / §FUTURE)"
      modified:
        - "mission.yaml: title + version 1.21.5 + lineage.total_revisions 52 → 53"
