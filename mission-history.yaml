  - change_id: "MSC-2026-04-21-005"
    semantic_version: "1.18.0"
    change_sequence: 45
    date: "2026-04-21"
    author: "Dr. QUAN"
    contributors: ["Claude Opus 4.7"]
    change_type: "feature"
    motivation_type: "adopter-ux"
    persistence: "permanent"
    intent: "adopter가 mission-history.yaml의 빈 related_commits 배열을 git log 날짜 매칭으로 retrofit할 수 있도록 `backfill-commits` CLI subcommand + `backfillRelatedCommits` public API를 제공. qmonster B-3 IMP 시퀀스의 5번째 axis — 이전 4개(v1.16.17/18/19/v1.17.0)와 달리 과거 이력의 traceability 공백을 소급 보완하는 repair 도구."
    decision: |
      새 CLI subcommand `mission-spec backfill-commits [--apply]` — `backfillRelatedCommits(projectDir, options?)` 순수 함수 + bin/mission-spec.js dispatcher case. dry-run 기본, --apply 시 단일 후보 entry만 파일에 기록.
      매칭: revision date ±1 day window 내 git commit을 후보로 수집. 1개 매칭 → auto-apply; ≥2 매칭 → ambiguous (apply 제외, 수동 편집 유도); 0개 → no-candidates.
      Apply 로직: change_id regex anchor + 2KB search window + 엄격한 `^(\\s*)related_commits:\\s*\\[\\]\\s*$` pattern으로 in-place text replacement. YAML 전체 재-serialize 회피 → adopter의 주석/format 보존. 이미 채워진 배열은 초기 필터에서 skip → 절대 덮어쓰지 않음.
      새 module `src/commands/backfill-commits.ts` (modules 19 → 20). 새 public API export `backfillRelatedCommits` + 3 types(`CommitCandidate`, `BackfillProposal`, `BackfillResult`) via src/index.ts (functions 23 → 24).
      `core/history.ts` `HistoryEntry` interface에 `related_commits?: string[]` 옵셔널 필드 추가 (실제 YAML에 존재했으나 TS 타입 누락 — v1.16.19의 tracking_mode 보정과 동일 패턴).
      MDR-006 §MINOR 확정 — 신규 CLI subcommand + 신규 public API function 두 조건 모두 충족.
    triggered_by: "사용자 요청: 'imp-6 진행' — 2026-04-21 qmonster 2차 감사 개선안 B-3(upstream IMP 시퀀스)의 4번째 항목. superpowers brainstorming → writing-plans → executing-plans 워크플로우 dogfood 계속."
    issue_or_context: "qmonster 로컬(v1.7.6, 15 revisions) 감사에서 15/15 revisions에 `related_commits: []` 확인 — 100% traceability gap. adopter가 feat commit 후 SHA를 수동 편집해 backfill해야 하는 현재 워크플로가 실전에서 지켜지지 않음을 증명. IMP-6은 이 gap을 3 커맨드로 retrofit 가능하게 함: `npx mission-spec backfill-commits` (dry-run), `--apply`, `git commit`. mission-spec 자체는 40/40 backfilled(0% gap)이라 self-healthy이지만 공개 도구로는 제공 가치 큼."
    changes:
      added:
        - "src/commands/backfill-commits.ts: `CommitCandidate` + `BackfillProposal` + `BackfillResult` interfaces (all exported) + `backfillRelatedCommits(projectDir, options?)` helper (exported) + internal `addDays` + `enumerateCommits` helpers (git log 실패 graceful degrade)"
        - "tests/commands/backfill-commits.test.ts: 9 신규 unit tests — empty timeline / already-populated skip / auto-apply / ambiguous / no-candidates classification / ±1 day window (before+after) / apply writes / apply safety(ambiguous NOT written)"
        - "tests/bin/cli.test.ts: 1 신규 integration test — `backfill-commits` dry-run에서 'Scanning' + 'AUTO-APPLY' 출력 확인 (기존 10 유지, 총 11)"
        - "bin/mission-spec.js: `backfill-commits` case + `--apply` 플래그 파싱 + HELP 업데이트 + `backfillRelatedCommits` import"
        - "src/index.ts: `backfillRelatedCommits` function + `CommitCandidate`/`BackfillProposal`/`BackfillResult` type exports 추가 (public API 23 → 24 functions)"
        - "README.md + README.ko.md + README.zh.md: 신규 `## Backfilling related_commits (v1.18.0+)` (EN) / `## related_commits 백필 (v1.18.0+)` (KO) / `## 回填 related_commits（v1.18.0+）` (ZH) 섹션 (MDR-007 trilingual)"
        - "docs/superpowers/specs/2026-04-21-imp6-backfill-commits-design.md + docs/superpowers/plans/2026-04-21-imp6-backfill-commits.md — brainstorming/writing-plans 산출물 (로컬 전용, docs/ gitignore)"
      modified:
