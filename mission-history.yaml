  - change_id: "MSC-2026-04-17-011"
    semantic_version: "1.15.0"
    change_sequence: 23
    date: "2026-04-17"
    author: "Dr. QUAN"
    contributors: ["Claude Opus 4.7"]
    change_type: "enhancement"
