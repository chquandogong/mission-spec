  - change_id: "MSC-2026-04-23-001"
    semantic_version: "1.21.1"
    change_sequence: 53
    date: "2026-04-23"
    author: "Dr. QUAN"
    contributors: ["Claude"]
    change_type: "fix"
    motivation_type: "correctness"
    persistence: "permanent"
    intent: 'IMP-10 v1.21.0에서 도입한 `done_when_refs` ref dispatch가 `evaluateCriterion` 내에서 shared-scope skip 이후에 실행되어, 실 git repo + `scope: "shared"` + gitignored path 조건이 동시 성립하면 refs가 shared-skip에 선점되는 latent ordering 버그를 수정한다. Rev.5 Claude 단독 리뷰 §5.1 지적.'
    decision: |
      v1.21.0 MSC-2026-04-22-002 follow_up의 최상단 항목이자 Rev.5 Claude 단독 리뷰 §5.1/§6 우선순위 1번. 순서 원칙은 "refs = trust-by-explicit-authoring이 shared-scope heuristic보다 우선".
      1. `src/core/evaluator.ts`의 `evaluateCriterion`에서 shared-scope skip 블록과 ref dispatch 블록을 swap. 새 순서: **ref → shared-scope skip → evals match → inference chain**.
      2. `tests/commands/eval.test.ts`에 regression test 추가 — 실 git repo(`git init`) + `.gitignore`에 local path + `done_when_refs`에 command=true + `scope: "shared"` 조합에서 ref가 이겨 `resolved_by: "ref"` + `skipped: undefined`임을 검증.
