  - change_id: "MSC-2026-04-18-002"
    semantic_version: "1.16.9"
    change_sequence: 33
    date: "2026-04-18"
    author: "Dr. QUAN"
    contributors: ["Claude Opus 4.7"]
    change_type: "enhancement"
    motivation_type: "compliance"
    persistence: "permanent"
    intent: "Close F-4 + C-4 from PROJECT_REVIEW_SNAPSHOT_V1.16.7 Rev.4 §8 item 2 — extend registry:check CURRENT_STATE coverage so (a) Title label is format-tolerant across locales (C-4), (b) existing-but-unlabeled CURRENT_STATE.md fails loud instead of silently passing (C-4), (c) `## 최근 구현 (vA ~ vB)` header is caught as stale when its upper bound trails package.json.version (F-4). Also refresh the CURRENT_STATE.md prose sections (최근 구현 / 직전 구현 / 다음 변경 후보) from the v1.14.0-era snapshot to the current v1.14.2 ~ v1.16.9 reality — the gap that Gemini Rev.2 Findings #2 specifically pinpointed."
    decision: |
      Three bundled changes, all tightly scoped to closing gaps the 3-vendor Rev.4 review flagged. (1) C-4 label tolerance: `scripts/verify-registry.js:250-275`의 TITLE_RE가 `Title|제목|标题|タイトル` 4 locale label을 수용하도록 확장. 동시에 CURRENT_STATE.md가 존재하지만 **어떤 Title 라벨도 없는 경우 fail**하도록 추가 — v1.16.8 이전에는 silent skip이어서 drift detector가 조용히 비활성화됐다. (2) F-4 최근 구현 range check: `scripts/verify-registry.js:283-303`에 `## 최근 구현 (vA ~ vB)` 정규식 + `compareSemver` + `loadPackageVersion` helper 추가. upper bound < package.json.version이면 drift 판정. MDR-007 정책 준수를 위해 header의 '최근 구현' label은 Korean-coupled로 유지 (다른 .mission/ 자산과 일관). (3) `.mission/CURRENT_STATE.md:44-67` prose sections 갱신 — `최근 구현 (v1.14.0 ~ v1.14.1)` → `최근 구현 (v1.14.2 ~ v1.16.9)` 및 실제 closed E/F/C-items로 내용 재작성, `직전 구현 (v1.13.x)` → `직전 구현 (v1.9.0 ~ v1.14.1)`으로 확장, `다음 변경 후보`를 Rev.4 §8의 남은 C-2/C-3/F-3/F-10/F-1/E-4/F-9로 재구성. 실행 과정: 먼저 verifier만 배치하면 본 저장소가 즉시 drift 판정(v1.14.1 < 1.16.8)을 내며 fail하므로 같은 릴리스에서 prose 갱신 + verifier를 묶음 — 검증기 생성과 첫 dogfood가 같은 commit에 들어가는 5번째 self-corrective loop 사례.
    triggered_by: "v1.16.8 entry MSC-2026-04-18-001 follow_up 첫 항목 (Rev.4 §8 item 2). Rev.4의 3-item merge(F-4 + C-4 + C-2) 중 C-2는 heavyweight(verify-registry가 evaluateMission을 호출해야 함)이라 별도 릴리스(v1.16.10 후보)로 분리 결정."
    issue_or_context: "Codex Rev.2 §5가 format-coupling을 Low로, Gemini Rev.2 Findings #2가 prose stale을 Medium으로, Claude Rev.1 §3.2가 F-4를 일반적 문제로 제기. 세 각도의 교집합은 'CURRENT_STATE.md가 표면 검증기에 비해 실제 drift가 넓다'는 것. 세 지적을 한 릴리스 안에 기계적으로 닫고 동시에 prose 본문 자체도 v1.14 → v1.16.9으로 이동."
    changes:
      added: []
      modified:
        - "scripts/verify-registry.js: TITLE_RE가 Title/제목/标题/タイトル 수용; CURRENT_STATE.md exists + no Title match인 경우 explicit failure; loadPackageVersion + compareSemver helper 추가; 최근 구현 (vA ~ vB) upper bound 검증 추가"
