  - change_id: "MSC-2026-04-21-007"
    semantic_version: "1.19.1"
    change_sequence: 47
    date: "2026-04-21"
    author: "Dr. QUAN"
    contributors: ["Claude Opus 4.7"]
    change_type: "documentation"
    motivation_type: "governance"
    persistence: "permanent"
    intent: "F-9 (Living Asset Registry 누적 크기 원칙) 미해결 거버넌스 축을 MDR-008으로 성문화. 기존 MDR-005(scope) / MDR-006(SemVer) / MDR-007(locale)에 이은 4번째 governance 축. qmonster B-3 IMP 시퀀스(v1.16.17~v1.19.0) 완료 후 남은 non-code follow-up 중 본 세션 내 완결 가능한 항목."
    decision: |
      `.mission/decisions/MDR-008-living-asset-registry-retention-and-compaction-policy.md` 신규 작성 (107 lines).
      핵심 정책:
        §INVARIANT — 재현성 불변식: 압축된 자산은 git history + 남은 registry 조합으로 재구성 가능해야 함.
        §TIMELINE — 현재 phase entries 원문 유지, 이전 phase는 phase-boundary 시점에 `evolution_summary.phases[]` + `persistence: "summarized"` stub으로 압축 가능.
        §SNAPSHOTS — phase-boundary snapshot 영구 보존, intra-phase snapshot은 phase 종료 시 선택적 prune.
        §EVIDENCE — 현재 phase VERIFICATION_LOG 엔트리 유지, 이전 phase는 summary stanza로 압축.
        §EVALS — 고아 override file 삭제 허용 (git 복구 가능).
        §DECISIONS — MDR은 영구, 대체 시 "Superseded by MDR-NNN" 헤더.
      Compaction은 phase-boundary에서 manual trigger (future IMP-9 `mission-spec compact` 후보).
      Mission Spec 자체는 v1.19.0 시점 42 entries / 496 KB로 압축 임계 미도달 — 본 MDR은 v2.0 identity 전환 같은 향후 phase 경계에서 발동.
      MDR-006 §PATCH 확정 — 신규 MDR 작성은 `.mission/decisions/` 디렉터리 content 추가이지 consumer surface 변경 아님 (v1.14.2 MDR-005 릴리스 패턴과 동일).
