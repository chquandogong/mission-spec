    intent: "v1.21.6 self-dogfooding 후속. done_when[0..4]의 약화된 '파일 존재' 문구를 '기능 동작' 계약으로 복원하고, 각 인덱스를 해당 skill의 test file을 실행하는 신규 eval에 바인딩한다. 권장 작업 2번 구현. done_when 문구가 실질적 기능 주장을 담도록 계약의 의미적 수준을 올린다."
    decision: |
      v1.21.6까지 done_when[0..5]는 'skills/ms-*/SKILL.md 존재' / 'plugin.json
      존재' / 'README.md 존재' 형태의 아티팩트 존재 계약이었다. ms-eval은 10/10
