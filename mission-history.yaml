  - change_id: "MSC-2026-04-18-006"
    semantic_version: "1.16.13"
    change_sequence: 37
    date: "2026-04-18"
    author: "Dr. QUAN"
    contributors: ["Claude Opus 4.7"]
    change_type: "enhancement"
    motivation_type: "compliance"
    persistence: "permanent"
    intent: "Close C-2 from PROJECT_REVIEW_SNAPSHOT_V1.16.7 Rev.4 (Codex Rev.2 §2, Medium) — mechanically tie CURRENT_STATE.md의 `완료 조건 (N/M PASS)` claim에 opt-in `--verify-live` 플래그로 `evaluateMission()` 실제 결과 비교. 기본은 fast mode 유지 (pre-commit 비용 보존); release gate는 opt-in 권고."
    decision: |
      verify-registry.js에 `--verify-live` 플래그 추가. 플래그 활성 시 `dist/index.js`에서 `evaluateMission`을 동적 import하여 현 프로젝트의 실제 passed count를 얻고, CURRENT_STATE.md의 claimPass와 비교. 불일치 시 "CURRENT_STATE.md completion-condition PASS: claims X, actual Y (live evaluateMission)" mismatch. 기본 (no flag): livePassed=null, 비교 skip — pre-commit 속도 영향 0. groundTruth()와 check()를 async로 승격 (동적 import 때문), main() wrapper로 감싸 exit 처리. pre-commit parity 유지 — pre-commit-parity.yml은 여전히 `npm run registry:check` 기본 호출. release.yml은 cold-build gate에서 직접 `npm test`를 돌리므로 별도 opt-in 불필요 (동일한 의미를 두 번 실행하는 비효율 방지). 3 new tests: (a) default 모드 skip, (b) --verify-live drift 감지, (c) --verify-live pass + "live evaluator: N/M" 출력 검증. 21 → 24 verify-registry tests, 251 → 254 full suite.
