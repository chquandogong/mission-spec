    persistence: "permanent"
    intent: "Close F-3 from PROJECT_REVIEW_SNAPSHOT_V1.16.7 Rev.4 (Codex Rev.2 §3, Medium — Claude Rev.1 F-3와 교차 확증) — `arch:verify`의 package_exports subkey 비교를 shallow `!==`에서 재귀 deep-compare로 교체, Codex가 temp fixture로 재현한 `[object Object]` false-drift 제거."
    decision: |
      scripts/generate-architecture.js 상단에 순수 함수 `diffExportsLeaf(pkgValue, regValue, path)` 추가 — primitive 비교는 leaf mismatch, object-vs-primitive는 shape mismatch, object-object는 subkey 집합 diff + 공통 subkey에 대해 재귀 호출. 이로써 `{"node": {types, import}, "default": {...}}` 같은 Node 조건부 exports 전체 depth가 투명하게 비교된다. `verifyCurrentMode`의 subkey loop는 기존 `pkgEntry[sk] !== regEntry[sk]` 한 줄을 `diffExportsLeaf(pkgEntry[sk], regEntry[sk], "['${key}'].${sk}")` 호출로 교체. 에러 메시지는 leaf path(`package_exports['.'].node.import mismatch: ...`)로 내려가 drift 위치를 정확히 짚는다. MDR-003 minimal-deps 준수 — `semver` / `deep-equal` 같은 npm 패키지 미도입. 3 new tests: (a) nested conditional exports 구조 일치 pass, (b) depth-2 경로 drift 감지, (c) `[object Object]` regression test (nested object equality). 이번 릴리스는 Claude Rev.1 F-3 + Codex Rev.2 §3 공동 지적을 한 번에 닫는다.
    triggered_by: "v1.16.10 entry MSC-2026-04-18-003 follow_up 1번째 항목 (F-3) — Rev.4 §8 item 5."
    issue_or_context: "Codex v1.16.7 §3가 temp fixture(.node/.default 조건부 exports)로 false drift `[object Object]`을 정확히 재현. Claude Rev.1 §3.2에서 F-3으로 이미 flagged됐으나 self-review에서는 실제 재현을 안 했다 — Codex 독립 실행이 필요한 지점이었음. v1.16.11 fix는 이제 Node.js exports spec이 허용하는 모든 conditional depth를 커버. 현 package.json은 flat depth라 즉각 효과는 regression 없음이지만, 외부 adopter가 nested exports를 사용하는 순간 필요한 안전망."
    changes:
      added: []
      modified:
        - "scripts/generate-architecture.js: diffExportsLeaf 재귀 함수 추가; verifyCurrentMode의 subkey 비교가 deep-compare로 교체"
