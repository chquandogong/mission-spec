    decision: |
      Two complementary validator extensions, bundled because both are "release-grade coverage completion" of existing scripts (the SNAPSHOT §7 priority-1 double-close). E-5 extends scripts/generate-architecture.js verifyCurrentMode: after the existing Object.keys comparison, for each common package_exports key the validator now compares the subkey set (types/import/require/default) and the string values. Previously a package.json entry like `"./commands/decide": { "types": "./dist/commands/decide.d.ts" }` could drift to `{ "types": "./dist/commands/WRONG.d.ts" }` and still pass arch:verify so long as the key `./commands/decide` was present on both sides. Codex v1.16.0 §4 called this out independently. E-8 extends scripts/verify-registry.js: groundTruth now also reads mission.yaml to expose missionTitle and doneWhenCount, and check() now validates .mission/CURRENT_STATE.md's `- **Title:**` line against mission.yaml.title and its `완료 조건 (N/M PASS)` total against done_when.length. This closes the manual-sync gap that E-6 raised (Title line not auto-synced by bump-metadata) by turning it into a CI failure, and extends registry:check's file coverage beyond REBUILD_PLAYBOOK + TRACE_MATRIX to the third long-stale prose asset Codex §3 singled out. VERIFICATION_LOG.yaml is deliberately NOT covered because its entries are historical snapshots — adding an entry is an authorship action, not a drift class. 8 new tests total (3 generate-architecture + 5 verify-registry); 223 → 231 tests across the repo; drift claims in REBUILD_PLAYBOOK and TRACE_MATRIX updated to reflect the new count.
