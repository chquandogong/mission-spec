  - change_id: "MSC-2026-04-18-004"
    semantic_version: "1.16.11"
    change_sequence: 35
    date: "2026-04-18"
    author: "Dr. QUAN"
    contributors: ["Claude Opus 4.7"]
    change_type: "bugfix"
