    author: "Dr. QUAN"
    contributors: ["Claude Opus 4.7"]
    change_type: "enhancement"
    motivation_type: "compliance"
    persistence: "permanent"
    intent: "Close D-1 from PROJECT_REVIEW_V1.14.1_2026-04-17 — verify that numeric claims embedded in REBUILD_PLAYBOOK.md and TRACE_MATRIX.yaml stay synchronized with the live source (module/API/skill/platform/test counts)."
    decision: |
      Added scripts/verify-registry.js — a TypeScript-AST-based verifier that walks src/, skills/, and tests/ to compute ground truth (module count via extractArchitecture, public_api.functions count, ms-* skill directories, convertTo* exports in platforms.ts, .test.ts file count, it()/test() call count via ts.forEachChild), then matches that against claims in .mission/reconstruction/REBUILD_PLAYBOOK.md (6 patterns: N개 모듈, public API N개 함수, skill N개, N개 플랫폼, (N test files), 현재 기준 N tests) and .mission/traceability/TRACE_MATRIX.yaml (inline "총 N tests across M files" + test_coverage.cases sum). Exit 1 on drift. --list mode dumps ground truth as JSON. First switch from regex counting to TS AST eliminated 3 false-positives (regex matched "it" in comments/strings, AST does not). CI parity via pre-commit-parity.yml step. pre-commit hook deliberately omitted — verifier takes ~10s due to TypeScript compiler init, too heavy for local dev loop; drift will be caught at push time. 9 new tests + one behaviorally-correct script = closes the last D-series gap.
    triggered_by: "v1.14.2 entry MSC-2026-04-17-009 follow-up D-1: 'scripts/verify-registry.js — content-level freshness for REBUILD_PLAYBOOK + TRACE_MATRIX + CURRENT_STATE + VERIFICATION_LOG'."
