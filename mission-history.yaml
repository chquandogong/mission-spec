    decision: |
      이 entry는 두 가지를 함께 기록한다. (a) self-description drift의 실제 파일 correction, (b) 그 변경의 SemVer 정책적 재분류.
      1. `skills/ms-context/SKILL*.md`의 Public API 섹션을 `evaluateMission()`에서 실제 함수인 `generateContext()`로 수정한다.
      2. README 3종은 패키지가 배포하는 `templates/pre-commit` baseline과 이 저장소가 체크인한 `.githooks/pre-commit`의 maintainer automation을 분리해서 설명한다.
      3. README 3종과 `bin/mission-spec.js` 주석은 현재 정식 CLI surface(`validate`, `backfill-commits`, `snapshot` 포함)를 누락 없이 반영한다.
      4. `CONTRIBUTING.md`와 `.mission/interfaces/API_REGISTRY.yaml`의 hook contract도 실제 `.githooks/pre-commit` 단계(changelog, metadata sync, arch sync/verify)를 기록한다.
      5. 최초 본 entry는 commit 055303a에서 `semantic_version: "1.20.0"`으로 기록돼 CHANGELOG에 중복 [1.20.0] 섹션을 만들었다. MDR-006 §PATCH 규칙("docs / MDR / README / CHANGELOG 업데이트")은 이러한 correction이 PATCH bump 대상임을 명시한다. 따라서 본 entry를 v1.20.1로 retag하고, `mission.yaml` / `package.json` / `.claude-plugin/plugin.json` / `.claude-plugin/marketplace.json` / `package-lock.json` / `.mission/` Version 헤더 / `CURRENT_STATE.md` Title을 1.20.1로 sync하며, `npm run changelog`로 CHANGELOG를 재생성해 중복 섹션을 제거한다. 최초 판정("새 버전은 올리지 않는다")은 철회된다.
      6. `.mission/snapshots/2026-04-22_v1.20.1_mission.yaml`을 생성한다.
      SemVer는 MDR-006 §PATCH: docs/CHANGELOG 업데이트 + history metadata correction이며 consumer-facing additive change는 없다.
    triggered_by: "사용자 요청(055303a): 프로젝트 이해 및 문서/코드 일관성 검토 후 drift 반영. 이어 후속 리뷰에서 CHANGELOG에 [1.20.0] 섹션이 두 개 존재한다는 점이 지적됨에 따라 MDR-006 §PATCH 규칙에 맞게 retag."
