# ─── 진화 요약 ───

evolution_summary:
  phases:
    - name: "initial-release"
      versions: ["1.0.0"]
      date_range: "2026-04-02"
      theme: "핵심 기능 구현"
      description: "스키마 정의, 4개 커맨드, 크로스 플랫폼 변환, TDD 기반 구현"
    - name: "stabilization"
      versions: ["1.1.0"]
      date_range: "2026-04-03"
      theme: "이름 충돌 해소"
      description: "marketplace 배포를 위한 skill ID 및 namespace 표준화"
    - name: "hardening"
      versions: ["1.2.0"]
      date_range: "2026-04-07"
      theme: "adversarial review 반영"
      description: "Codex/Gemini 크로스 리뷰 이슈 해결, 공개 API 정비"
    - name: "marketplace-ready"
      versions: ["1.4.0"]
      date_range: "2026-04-07"
      theme: "배포 준비, 정체성 확립"
      description: "done_when을 기술 기준으로 전면 재작성, 플러그인 메타데이터 추가"
    - name: "living-asset"
      versions: ["1.5.0"]
      date_range: "2026-04-08"
      theme: "Living Asset Registry 도입"
      description: "lineage 스키마 확장, mission-history.yaml 변경 원장, MDR 4건, ms-status/ms-report history 연동"
    - name: "eval-extensibility"
      versions: ["1.6.0"]
      date_range: "2026-04-13"
      theme: "Evaluator 확장성 + 스냅샷 자동화"
      description: "llm-eval 타입과 오버라이드 파일로 LLM/주관 판정 수용, mission-history JSON Schema + validateHistory API, 스냅샷 스크립트 + pre-commit 훅, status/report graceful fallback"
    - name: "architecture-assetization"
      versions: ["1.7.0"]
      date_range: "2026-04-14"
      theme: "아키텍처 지식의 자산화"
      description: "3-모델 교차 검증 합의 기반. design_refs + architecture_delta 스키마 확장, Architecture/Dependency/API/Traceability registry, ms-context, Rebuild Playbook, Verification Evidence Ledger까지 포함해 구조 정보의 capture와 consumption을 함께 자산화"

  identity_evolution:
    - version: "1.0.0"
      identity: "Claude Code Plugin 구현"
    - version: "1.4.0"
      identity: "Portable한 task contract 도구 (core library + skill bundle)"
    - version: "1.5.0"
      identity: "자산 관리가 가능한 task contract 도구 (Living Asset Registry)"
    - version: "1.6.0"
      identity: "확장 가능한 평가 + 자동 아카이브 도구 (Evaluator Extensibility + Snapshot Automation)"
    - version: "1.7.0"
      identity: "재현 가능한 아키텍처 자산 도구 (Architecture Assetization)"

  identity_evolution_note: "제품 정체성이 플러그인 → 범용 도구 → 자산 관리 → 평가/자동화 → 재현 가능한 아키텍처 자산으로 진화"

  done_when_evolution:
    - version: "1.0.0"
      style: "선언적 문장 중심 (/ms:init 명령으로 ...)"
    - version: "1.4.0"
      style: "검증 가능한 기술 기준 (파일 존재 + automated eval 이름)"

  done_when_evolution_note: "완료 조건이 서술형 → 실행 가능한 계약으로 진화"

