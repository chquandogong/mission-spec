    decision: |
      Extended scripts/bump-metadata.js to also rewrite the `- **Title:** <…>` line in .mission/CURRENT_STATE.md from mission.yaml.title, in the same pass as the D-3 Version-header sync. TITLE_RE is intentionally narrow (`^(\s*-\s*\*\*Title:\*\*\s+)(.+?)\s*$/m`) so only the Title line in the Current-State asset is rewritten; MDR bodies, templates, snapshots, and evals are still excluded by EXCLUDE_SUBDIRS. loadMissionTitle() returns null if mission.yaml is absent or malformed, so the Version sync path still works for hand-rolled or partial fixtures (test coverage confirms). A single file can now produce multiple entries in the updates list (Version + Title); the apply loop dedupes writes by last-`next`-wins per file while still printing every drift line. This also exercised the E-1 cold-build gate's spirit in practice: when the test suite grew from 231 to 237, registry:check (v1.16.2 E-8) immediately flagged the REBUILD_PLAYBOOK + TRACE_MATRIX drift on the next run, forcing a matching update in the same commit. E-6 is now fully closed — previously validated (v1.16.2) but manually fixed, now validated and auto-corrected.
