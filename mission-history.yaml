    intent: "Close D-3 from PROJECT_REVIEW_V1.14.1_2026-04-17 — automate .mission/ Version-header sync with package.json so patch releases cannot silently leave the descriptive layer stale again."
    decision: |
      Added scripts/bump-metadata.js (dry-run / --apply / --check) that walks .mission/ and rewrites the 'Version: X.Y.Z' token in .md/.yaml/.yml files to match package.json.version. Historical subdirectories (decisions/, snapshots/, templates/, evals/) are explicitly excluded — their Version fields are time-stamped records, not live metadata. package.json gains two scripts (metadata:check, metadata:sync); .githooks/pre-commit runs --apply + `git add -u .mission` so maintainers never re-do this step by hand; .github/workflows/pre-commit-parity.yml runs --check as a CI parity gate. First real invocation caught two previously hidden stale headers — .mission/architecture/ARCHITECTURE_CURRENT.yaml and DEPENDENCY_GRAPH.yaml were still at 1.14.0 despite four release cycles since; this release both implements the detector and applies its first fix in one atomic commit.
    triggered_by: "v1.14.2 entry MSC-2026-04-17-009 follow-up D-3: 'scripts/bump-metadata.js + pre-commit hook for version-header sync across .mission/*'. Also evidenced by v1.14.1/2/3 release notes repeatedly touching .mission/ headers by hand and still missing two files."
    issue_or_context: "Across v1.14.0 → v1.14.1 → v1.14.2 → v1.14.3, every release manually touched a subset of .mission/ Version headers, and the set differed each time. Two headers (ARCHITECTURE_CURRENT, DEPENDENCY_GRAPH) had been silently carrying 1.14.0 since four releases ago — Codex's v1.14.1 review called this out as a Medium-severity drift class (D-3 in the baseline review). Manual process was provably insufficient; this release makes the sync a validator-backed build step."
    changes:
      added:
        - "scripts/bump-metadata.js (dry-run/apply/check modes; walks .mission/, excludes decisions+snapshots+templates+evals as historical)"
        - "tests/scripts/bump-metadata.test.ts (11 tests: dry-run reporting, --apply rewrites, --check exit codes, idempotency, skip files without header, .md/.yaml filter, invalid semver error, missing .mission/ graceful, 3 exclusion cases for decisions/snapshots/templates)"
      modified:
        - "package.json: scripts.metadata:check + metadata:sync; version 1.14.3 → 1.15.0"
        - ".githooks/pre-commit: npm run metadata:sync + `git add -u .mission` between snapshot/changelog and arch:sync/verify"
        - ".github/workflows/pre-commit-parity.yml: new step 'npm run metadata:check' after plugin:verify"
        - ".mission/architecture/ARCHITECTURE_CURRENT.yaml: Version 1.14.0 → 1.15.0 (stale since v1.14.0 release; caught by first metadata:check dry-run)"
        - ".mission/architecture/DEPENDENCY_GRAPH.yaml: Version 1.14.0 → 1.15.0 (same class of stale)"
        - ".mission/{CURRENT_STATE.md, evidence/VERIFICATION_LOG.yaml, interfaces/API_REGISTRY.yaml, reconstruction/REBUILD_PLAYBOOK.md, traceability/TRACE_MATRIX.yaml}: Version 1.14.3 → 1.15.0 (applied via the new script — first dogfooding)"
