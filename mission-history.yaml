    decision: |
      Authored MDR-006 'SemVer policy for meta-tooling and scripts-only changes' via generateMdrDraft (second dogfood of ms-decide on its own project after MDR-005). Three classification tiers keyed on consumer surface: MAJOR for breaking schema / public API / skill / platform / CLI surface; MINOR for additive consumer surface (new public function, new skill, new platform, new CLI subcommand, new package.json.exports subpath, new top-level npm script, new workflow job, validator behaviour change from warn to fail); PATCH for everything that does not change consumer surface (existing script function extension, validator drift-range extension, CI workflow step edits, bugfix, docs / MDR / README / test-only / .mission/ descriptive asset updates). v1.16.1 retroactively classified as §PATCH 3 (CI workflow edit), v1.16.2 as §PATCH 1 (existing script extension), v1.16.3 as §PATCH 1. Going forward every mission-history risk field ends with 'Semantic version: <grade> per MDR-006 §<category> (<reason>).' MDR-005 and MDR-006 are complementary — MDR-005 governs scope ('what can I build'), MDR-006 governs grade ('which release label does it get'). This release is itself the first under MDR-006 and is classified §PATCH 6 (docs/MDR update).
    triggered_by: "v1.16.3 entry MSC-2026-04-17-015 follow-up E-3 (listed in that entry's follow_up as 'three consecutive releases are now scripts-only patches; the precedent is solid, formalizing it is cheap'); SNAPSHOT §5.1 + §6 E-3 diagnosis, Codex §7 Low-Medium concur."
