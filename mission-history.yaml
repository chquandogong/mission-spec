  - change_id: "MSC-2026-04-21-001"
    semantic_version: "1.16.17"
    change_sequence: 41
    date: "2026-04-21"
    author: "Dr. QUAN"
    contributors: ["Claude Opus 4.7"]
    change_type: "feature"
    motivation_type: "adopter-ux"
    persistence: "permanent"
    intent: "`ms-status`에 scaffolded-but-empty 디렉터리 경고 추가. qmonster 감사(2026-04-21, memory: project_qmonster_adoption.md §5 + recommendation 2)에서 확인된 anti-pattern — `.mission/decisions/`, `.claude/rules/` 등 scaffold 선언만 있고 비어 있는 폴더 — 를 adopter가 stale 상태로 방치하지 않도록 status 출력 단계에서 즉시 감지."
    decision: |
      `getMissionStatus(projectDir)` 결과에 `scaffoldingWarnings: Array<{ path, hint }>` 필드 + markdown `## Scaffolding` 섹션을 추가.
      감지 규칙: `.mission/decisions/` 또는 `.mission/snapshots/`가 **존재하지만 dotfile이 아닌 엔트리가 0개**일 때만 경고. 아예 없는 디렉터리는 opt-out으로 간주해 경고하지 않는다 (adopter가 그 facility를 사용하지 않기로 선택).
      remediation hint는 디렉터리별로 고정:
        - decisions: "run `ms-decide` to record material decisions as MDRs"
        - snapshots: "run `npm run snapshot` (or wire into pre-commit) to capture per-revision snapshots"
      신규 helper `detectScaffoldedButEmpty(projectDir)`는 commands/status.ts 내부 API로 유지 — `src/index.ts`에 재노출하지 않는다 (consumer surface는 `StatusResult.scaffoldingWarnings` 하나만).
