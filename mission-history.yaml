# ─── 핵심 결정 인덱스 ───

key_decisions:
  - decision: "task contract only — orchestration 하지 않음"
    version: "1.0.0"
    rationale: "scope creep 방지, 단일 책임"
    status: "active"
    mdr: "MDR-001-task-contract-only"
  - decision: "execution_hints는 suggestion으로만"
    version: "1.0.0"
    rationale: "런타임 자율성 보장"
    status: "active"
  - decision: "ms-* prefix 및 /mission-spec: namespace 도입"
    version: "1.1.0"
    rationale: "marketplace 이름 충돌 방지"
    status: "active"
    mdr: "MDR-002-ms-prefix-adoption"
  - decision: "외부 dependency 최소화 (ajv + yaml만)"
    version: "1.0.0"
    rationale: "portability, 설치 부담 최소화"
    status: "active"
    mdr: "MDR-003-minimal-dependencies"
  - decision: "done_when을 검증 가능한 기술 기준으로 전환"
    version: "1.4.0"
    rationale: "self-dogfooding, evaluateMission('.')으로 자동 평가 가능"
    status: "active"
    mdr: "MDR-004-done-when-eval-linking"
  - decision: "meta-tooling expansion은 task-contract scope 안에서만 허용"
    version: "1.14.1"
    rationale: "무결성 검증기, Living Asset Registry 유지도구, 배포 표면은 허용하되 orchestration/runtime은 계속 범위 밖"
    status: "active"
    mdr: "MDR-005-meta-tooling-expansion-within-task-contract-scope"
