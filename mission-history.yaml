  - change_id: "MSC-2026-04-21-010"
    semantic_version: "1.20.0"
    change_sequence: 50
    date: "2026-04-21"
    author: "Dr. QUAN"
    contributors: ["Codex"]
    change_type: "feature"
    motivation_type: "adopter-ux"
    persistence: "permanent"
    intent: "qmonster adopter review에서 드러난 현실 제약을 Mission Spec 쪽에서 흡수한다. sparse legacy history ledger를 backward-compatible하게 읽고, shared clone에서는 gitignored local-only artifact를 요구하는 criteria를 건너뛰며, prose/backticked command success clauses를 안전 범위에서 자동 평가해 adopter가 self-dogfooding 규범을 그대로 따라야만 하는 구조를 완화한다."
    decision: |
      qmonster는 adopter이지 self-hosting maintainer 저장소가 아니다. 따라서 mission-spec이 adopter 현실을 더 잘 모델링해야 한다는 방향으로 수정했다.
      1. `src/schema/validator.ts`에 `normalizeHistoryData()`를 추가해 legacy `mission-history.yaml` entry가 `changes.added/modified/removed` 또는 `done_when_delta.*`의 일부를 생략해도 빈 배열로 보정 후 검증한다. 단, 기존 값의 타입이 잘못된 경우는 그대로 남겨 실제 schema error는 계속 fail한다.
      2. `src/core/history.ts`도 같은 normalization을 거쳐 sparse legacy ledger를 로드한다. 그 결과 adopter repo의 오래된 history 형식 때문에 status/context가 즉시 깨지는 문제를 줄인다.
      3. `src/core/evaluator.ts`는 `EvaluateOptions { scope?: "workspace" | "shared" }`를 도입한다. `shared` scope에서는 criterion이 존재하지 않는 gitignored local-only artifact(예: `.docs/...`, `.mission/CURRENT_STATE.md`)만 가리킬 때 skip/pass 처리한다.
      4. evaluator는 success hint가 붙은 safe command clause(`cargo build`, `cargo test`, `npm test`, backticked `node -e ...` 등)를 prose에서 추론해 실행할 수 있다. prose-heavy adopter의 `done_when`을 일부 기계 평가 가능하게 넓힌다.
      5. `evaluateMission()` / `getMissionStatus()`는 optional options를 받고, CLI `eval` / `status`에 `--shared` 플래그를 추가한다. README 3종과 internal docs도 이 surface를 함께 문서화한다.
      6. qmonster 재검토 결과: `mission-spec validate /tmp/qmonster-review`는 이제 통과하고, `mission-spec eval --shared /tmp/qmonster-review`는 0/86 → 14/86으로 개선된다. 남은 72개는 실제로 prose/manual gate가 많다는 뜻이므로 다음 문제는 schema/shared-clone compatibility가 아니라 gate structuring이다.
      SemVer는 MDR-006 §MINOR. `EvaluateOptions` type export와 `eval/status --shared` surface는 additive consumer change이며 기존 호출과 호환된다.
