      - "E-4 external adopter 1+ — only remaining E-series item; 7 of 8 closed in this session (E-1 v1.16.1, E-5+E-8 v1.16.2, E-6 v1.16.3, E-3 v1.16.4, E-2 v1.16.5, E-7 v1.16.6); E-4 is the non-code item and is the natural trigger for the next 3-vendor review cycle"
      - "Tag and push v1.16.1 → v1.16.6 sequence (6 tags) to exercise the cold-build release gate"
