  - change_id: "MSC-2026-04-24-001"
    semantic_version: "1.21.8"
    change_sequence: 60
    date: "2026-04-24"
    author: "Dr. QUAN"
    contributors: ["Claude"]
    change_type: "fix"
    motivation_type: "correctness"
    persistence: "permanent"
    intent: "`.github/workflows/release.yml`의 `git fetch origin main --depth=1`이 tag가 origin/main tip이 아닐 때 merge-base --is-ancestor를 실패시키는 latent bug를 수정한다. v1.21.6 publish 시 최초 발현 (c3465d8이 origin/main HEAD, 2c06941이 tag → is-ancestor fail). `--depth=1` 제거로 해결. 이후 multi-commit-ahead tag 재시도 가능해짐."
    decision: |
      v1.21.6 push 시나리오에서 발현된 workflow bug:
      - origin/main = c3465d8 (v1.21.7)
      - v1.21.6 tag = 2c06941 (c3465d8의 parent)
      - workflow의 `git fetch origin main --depth=1`이 shallow marker를 남김
      - `git merge-base --is-ancestor 2c06941 origin/main`이 shallow 경계를 넘지 못하고 false 반환
      - 결과: "Release ref v1.21.6 (2c06941) is not contained in origin/main" 오류로 workflow 중단

      v1.21.4/v1.21.5는 각각 push 당시 main HEAD였으므로 이 bug가 발현되지 않음.
      v1.21.6은 최초로 "tag가 tip이 아닐 때" 조건을 만들어 bug 노출.

      **수정**: line 70의 `git fetch origin main --depth=1` → `git fetch origin main`.
      checkout step은 이미 `fetch-depth: 0`으로 전체 history를 받으므로 --depth 옵션
      자체가 중복이자 유해. 제거 후 ancestor check가 full history에서 정상 동작.

      **v1.21.6 gap 처리**: 본 §PATCH는 workflow fix만 포함. v1.21.6은 이미 tag는
      존재하지만 npm 미발행 상태로 남긴다. 재publish하려면 v1.21.6 tag 자체의
      workflow file이 여전히 buggy (tag의 commit = 2c06941 = fix 없는 상태)이므로
      retag 또는 수동 publish 필요 — 그 비용 대비 adopter 영향(0건 추정)이 낮아
      gap 허용. 향후 adopter 요청 시 재검토.

      SemVer: MDR-006 §PATCH 3 (CI workflow 편집). v1.21.3 actions v5 bump와 동일 grade.
    triggered_by: "v1.21.6 tag push 시 workflow run 24824758099 실패. 사용자 요청 옵션 (A) — v1.21.7만 publish 후 workflow bug는 별도 §PATCH로 수정."
    issue_or_context: |
      workflow 파일 `verify-and-publish` job의 "Verify publish ref matches
      package.json and origin/main" step (lines 57-75). checkout은 fetch-depth: 0
      이지만 바로 뒤 `git fetch origin main --depth=1`이 shallow marker를 씌워
      ancestor check 실패. 의도: origin/main ref refresh (race condition 대비).
      --depth=1이 없어도 fetch는 전체 ancestor chain을 가져오므로 ref refresh는
      동일하게 동작한다.

      이 bug가 드러나기까지 4 release 걸림 (v1.21.4~v1.21.7 중 v1.21.6만 조건 충족).
      "tag at tip" 가정이 묵시적으로 유지된 상태에서 묵묵히 대기. 본 fix로
      가정을 제거.
    changes:
      added:
        - ".mission/snapshots/2026-04-24_v1.21.8_mission.yaml"
      modified:
        - ".github/workflows/release.yml: line 70 `git fetch origin main --depth=1` → `git fetch origin main` + 설명 주석 추가 (MSC-2026-04-24-001 참조 포함)"
