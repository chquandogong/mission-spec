  - change_id: "MSC-2026-04-17-018"
    semantic_version: "1.16.6"
    change_sequence: 30
    date: "2026-04-17"
    author: "Dr. QUAN"
    contributors: ["Claude Opus 4.7"]
    change_type: "enhancement"
    motivation_type: "compliance"
    persistence: "permanent"
    intent: "Close E-7 from PROJECT_REVIEW_SNAPSHOT_V1.16.0_2026-04-17 §5.4 — reduce verify-registry.test.ts wall time from ~18s (serial subprocesses) to ~8s by switching to vitest's test.extend fixture pattern + describe.concurrent + async execFile."
    decision: |
      Three-step refactor of tests/scripts/verify-registry.test.ts, no production code change. (1) Replaced the module-level `let tempDir: string` with a per-test fixture via `base.extend<{ fx: Fixture }>` so each concurrent test owns its own tempDir, writer helpers, and runScript callback — the shared-state race that killed the first `describe.concurrent` attempt is eliminated at the test-scope level, not patched. (2) Switched runScript from `execFileSync` to `promisify(execFile)` so subprocesses actually run in parallel instead of each one blocking the test worker thread synchronously. (3) Wrapped the block in `describe.concurrent` and flipped all 14 test function signatures to `async ({ fx }) => ...`. The sync `expect(() => fn()).toThrow(...)` assertions became `await expect(fn()).rejects.toThrow(...)`. generate-architecture and bump-metadata test files were NOT refactored — they were 3s serial each and the marginal benefit doesn't justify the test-scope churn while these refactors are still TDD-fresh. Measured wall time on this host: verify-registry.test.ts 18.1s → 8.2s (55% reduction); full suite 24s → 10.6s (56% reduction). Semantic version: patch per MDR-006 §PATCH 6 (test-only refactor — no source, script, or workflow change).
    triggered_by: "v1.16.5 entry MSC-2026-04-17-017 follow_up E-7 (listed as '237 tests, verify-registry.test.ts still ~14s of ~24s suite'); first describe.concurrent attempt in this session produced 5 test failures from shared tempDir — test.extend fixture was the correct fix."
    issue_or_context: "With the v1.16 cycle adding 8 new tests (3 E-5 in generate-architecture, 5 E-8 in verify-registry, 6 E-6 in bump-metadata), pre-commit wall time moved from ~16s (v1.16.0) to ~26s (v1.16.5). The underlying cause is that each test spawns a Node subprocess with a TypeScript compiler init, and serial execFileSync blocks the test worker. E-7 is the accumulated-interest bill from the E-5/E-8/E-6 extensions and closes that loop before the habit of adding subprocess tests compounds further."
    changes:
      added: []
      modified:
        - "tests/scripts/verify-registry.test.ts: migrated from shared `let tempDir` + beforeEach/afterEach to base.extend<{ fx: Fixture }> per-test fixture with writeFixture/writeStandardFixture/writePlaybook/writeTrace/writeMission/writeCurrentState helpers; runScript promisified; describe.concurrent enabled; all 14 test signatures now async with .rejects.toThrow for error paths"
