name: pre-commit-parity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: pre-commit-parity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-history-commits:
    name: Living Asset Registry validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate mission-history.yaml commit references
        run: npm run validate:history-commits

      - name: Verify snapshot dedup is deterministic (no spurious additions)
        run: |
          npm run snapshot --silent
          git diff --exit-code .mission/snapshots/ || {
            echo "::error::Running snapshot produced unstaged changes. \
            A new mission.yaml version may be missing its snapshot commit, \
            or the dedup logic regressed."
            exit 1
          }

      - name: Verify CHANGELOG generation is deterministic
        run: |
          npm run changelog --silent
          git diff --exit-code CHANGELOG.md || {
            echo "::error::Running changelog generation produced unstaged changes. \
            mission-history.yaml may have changed without regenerating CHANGELOG.md, \
            or the generator regressed."
            exit 1
          }

      - name: Build dist/ for architecture extractor
        run: npm run build

      - name: Verify architecture extraction is deterministic
        run: |
          npm run arch:sync --silent
          git diff --exit-code .mission/architecture/ARCHITECTURE_COMPUTED.yaml || {
            echo "::error::Running arch:sync produced unstaged changes. \
            src/ changed without regenerating ARCHITECTURE_COMPUTED.yaml, \
            or the extractor regressed."
            exit 1
          }

      - name: Verify ARCHITECTURE_CURRENT.yaml is in sync with src/
        run: npm run arch:verify

      - name: Verify plugin manifest and skills structure
        run: npm run plugin:verify
