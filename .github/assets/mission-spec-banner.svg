<svg width="1280" height="360" viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mission Spec</title>
  <desc id="desc">A banner for Mission Spec, a task contract layer for AI agent workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="46%" stop-color="#13243b"/>
      <stop offset="100%" stop-color="#10251f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>

  <g opacity="0.9">
    <path d="M160 250C275 160 386 204 501 116C631 16 757 137 874 80C994 22 1100 60 1190 18" fill="none" stroke="#38bdf8" stroke-opacity="0.35" stroke-width="2"/>
    <path d="M98 292C242 238 344 274 474 205C600 138 708 208 842 155C1002 92 1080 184 1210 128" fill="none" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="2"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="82" y="66" width="1116" height="228" rx="24" fill="url(#panel)" stroke="#334155" stroke-width="1"/>
    <rect x="82" y="66" width="1116" height="5" rx="2.5" fill="url(#accent)"/>
  </g>

  <g transform="translate(126 111)">
    <rect x="0" y="0" width="128" height="128" rx="22" fill="#0b1220" stroke="#334155"/>
    <path d="M38 37H90M38 64H90M38 91H74" stroke="#e5eefb" stroke-width="8" stroke-linecap="round"/>
    <circle cx="94" cy="91" r="10" fill="#14b8a6"/>
    <path d="M95 91L115 111" stroke="#38bdf8" stroke-width="7" stroke-linecap="round"/>
  </g>

  <g transform="translate(298 105)">
    <text x="0" y="58" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="58" font-weight="760">Mission Spec</text>
    <text x="2" y="98" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="450">Task contracts, explicit gates, and audit trails for AI agent workflows.</text>

    <g transform="translate(2 132)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="650">
      <rect x="0" y="0" width="138" height="40" rx="20" fill="#0f766e" fill-opacity="0.32" stroke="#14b8a6" stroke-opacity="0.55"/>
      <text x="20" y="26" fill="#ccfbf1">mission.yaml</text>
      <rect x="154" y="0" width="96" height="40" rx="20" fill="#075985" fill-opacity="0.35" stroke="#38bdf8" stroke-opacity="0.52"/>
      <text x="177" y="26" fill="#e0f2fe">evals[]</text>
      <rect x="266" y="0" width="176" height="40" rx="20" fill="#581c87" fill-opacity="0.32" stroke="#a78bfa" stroke-opacity="0.52"/>
      <text x="287" y="26" fill="#f3e8ff">done_when_refs[]</text>
      <rect x="458" y="0" width="194" height="40" rx="20" fill="#713f12" fill-opacity="0.28" stroke="#fbbf24" stroke-opacity="0.48"/>
      <text x="481" y="26" fill="#fef3c7">Living Asset Registry</text>
    </g>
  </g>

  <g transform="translate(988 134)" opacity="0.95">
    <rect x="0" y="0" width="146" height="90" rx="16" fill="#020617" fill-opacity="0.5" stroke="#475569"/>
    <path d="M28 28H74M28 48H118M28 68H96" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
    <circle cx="110" cy="30" r="9" fill="#14b8a6"/>
